<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geçici Olarak Servis Dışı</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    /* KAYAN YAZI */
    .marquee {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding: 20px 0;
    }

    .marquee-text {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 10s linear infinite;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Glow efekti */
    .marquee-text span {
      margin-right: 60px;
      color: #ff4fd8;
      text-shadow: 0 0 15px #ff4fd8;
    }

    /* Alt bilgi */
    .footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.6;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>🚧 Geçici Olarak Servis Dışı</h1>

    <p>
      Şu anda sitemizde bakım çalışması yapıyoruz.  
      Daha iyi bir deneyim için kısa süre içinde geri döneceğiz 🙏
    </p>

    <div class="marquee">
      <div class="marquee-text">
        <span>⚠️ Geçici olarak servis dışıyız</span>
        <span>🔧 Bakım çalışması yapıyoruz</span>
        <span>🙏 Anlayışınız için teşekkürler</span>
        <span>🚀 Çok yakında geri döneceğiz</span>
      </div>
    </div>

    <div class="footer">
      © 2026 Arda Shop - Tüm hakları saklıdır
    </div>

  </div>

</body>
</html>
